#==========================
# nginx.conf (Production)
#==========================

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

    # BEGIN AUTO:PORT:5173
    server {
        # เปิด HTTPS + HTTP/2 บนพอร์ต 5173
        listen       5173 ssl http2;
        # ระบุชื่อโฮสต์/ไอพีที่จะเข้าถึง
        server_name  dev942 10.1.66.20 10.1.64.69 solution.liteon.com;

        # ---------- SSL CERTIFICATE ----------
        ssl_certificate      "D:/certs/dev942/fullchain.pem";
        ssl_certificate_key  "D:/certs/dev942/privkey.pem";

        # ssl_certificate      "D:/certs/dev942/solution.liteon.com+5.pem";
        # ssl_certificate_key  "D:/certs/dev942/solution.liteon.com+5-key.pem";

        # ---------- SSL PARAMS ----------
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ---------- RESOLVER (สำหรับ proxy SNI/ชื่อโดเมน) ----------
  
        # ---------- STATIC (Vite build) ----------
        # โฟลเดอร์ผลลัพธ์จาก `vite build`
        root  "D:/NodeProject/dist";
        index index.html index.htm;

        # ---------- API PROXY: Authentication (ของเดิม) ----------
        location /APIAuthentication/ {
            #===============================================================#
            proxy_pass https://api941;

            # กำหนด Host + SNI ให้ชัด
            proxy_set_header Host api941;
            proxy_ssl_server_name on;
            proxy_ssl_name api941;

            # ถ้า endpoint นี้ต้องใช้ API Key ให้ใส่ที่นี่ (ค่าตัวอย่างเดิม)
            proxy_set_header X-API-KEY d9613ca5-6fc2-4253-8cc2-9575f3cae24a;

            # ส่งต่อ Authorization จาก client (ถ้ามีการใช้)
            proxy_set_header Authorization $http_authorization;

            proxy_http_version      1.1;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto  $scheme;
            proxy_set_header        Connection         "";
            proxy_connect_timeout   50s;
            proxy_send_timeout      50s;
            proxy_read_timeout      50s;
            #===============================================================#
        }

        # ---------- API PROXY: Human Resources (ของใหม่) ----------
        # Frontend เรียก: /APIHumanResources/api/Employee/GetEmployeeProfile?Value=<USER>
        # ปลายทางจริง:  https://api941.liteon.com/APIHumanResources/api/Employee/GetEmployeeProfile?Value=<USER>
        location /APIHumanResources/ {
            #===============================================================#
            proxy_pass https://api941.liteon.com;

            proxy_set_header Host api941.liteon.com;
            proxy_ssl_server_name on;
            proxy_ssl_name api941.liteon.com;

            # แนบ API Key ที่ "ฝั่งเซิร์ฟเวอร์" (ปลอดภัยกว่าเก็บใน React)
            proxy_set_header X-API-KEY        019bbbda-f3b6-768c-abbc-cada74d21886;
            # proxy_set_header X-Api-Key        019bbbda-f3b6-768c-abbc-cada74d21886;
            # proxy_set_header X-APIKEY         019bbbda-f3b6-768c-abbc-cada74d21886;
            # proxy_set_header X-Liteon-Api-Key 019bbbda-f3b6-768c-abbc-cada74d21886;

            # ถ้าปลายทางต้องการ Authorization จาก client ให้เปิดบรรทัดนี้
            # proxy_set_header Authorization $http_authorization;

            proxy_http_version      1.1;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto  $scheme;
            proxy_set_header        Connection         "";
            proxy_connect_timeout   50s;
            proxy_send_timeout      50s;
            proxy_read_timeout      50s;
            #===============================================================#
        }

        # ---------- API PROXY: Menu (ของใหม่) ----------
        # Frontend เรียก: /APIMenu/api/UserRole/GetAllMenuByUser
        # ปลายทางจริง:  https://api941.liteon.com/APIMenu/api/UserRole/GetAllMenuByUser
        location /APIMenu/ {
            #===============================================================#
            proxy_pass https://api941.liteon.com;

            proxy_set_header Host api941.liteon.com;
            proxy_ssl_server_name on;
            proxy_ssl_name api941.liteon.com;

            proxy_set_header X-API-KEY 019b303f-4c4d-785c-a738-22864f7751c0;

            proxy_http_version      1.1;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto  $scheme;
            proxy_set_header        Connection         "";
            proxy_connect_timeout   50s;
            proxy_send_timeout      50s;
            proxy_read_timeout      50s;
            #===============================================================#
        }

        # ---------- SPA routing ----------
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---------- LOGS ----------
        access_log  logs/site_5173.access.log;
        error_log   logs/site_5173.error.log;
    }
    # END AUTO:PORT:5173
    
    
}
